# .github/workflows/preview-deploy.yml — BURDEN
#
# BURDEN's web app is at burden-app/ (Vite 6 + React 18). Builds on every
# push to a feature-style branch and publishes to a SEPARATE previews repo
# (burdenbypva-previews) so production stays untouched.
#
# Prerequisites in the BURDEN repo:
#   1. A previews repo at <owner>/burdenbypva-previews exists with GH Pages enabled
#      (Source: gh-pages branch, root).
#   2. Secret:
#        PREVIEW_DEPLOY_TOKEN — fine-scoped PAT with `contents:write` on
#                               the previews repo only.
#
# Drop at .github/workflows/preview-deploy.yml in the BURDEN repo.

name: preview-deploy

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
      - 'bugfix/**'
      - 'docs/**'
      - 'refactor/**'
      - 'wip/**'

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PREVIEWS_REPO_OWNER: aaemmanuel-created
  PREVIEWS_REPO_NAME: burdenbypva-previews
  PREVIEWS_PAGES_HOST: aaemmanuel-created.github.io/burdenbypva-previews

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: burden-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: burden-app/package-lock.json

      - name: Compute branch slug
        id: slug
        working-directory: .
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SLUG="$(echo "$BRANCH" | tr '/_' '--' | tr -cd 'a-zA-Z0-9-' | tr 'A-Z' 'a-z')"
          echo "value=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Install
        run: npm ci --ignore-scripts

      - name: Build (with preview base path)
        env:
          PREVIEW_BASE: /burdenbypva-previews/preview/${{ steps.slug.outputs.value }}/
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npx vite build --base "$PREVIEW_BASE"

      - name: Deploy to previews repo
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}
          external_repository: ${{ env.PREVIEWS_REPO_OWNER }}/${{ env.PREVIEWS_REPO_NAME }}
          publish_branch: gh-pages
          publish_dir: ./burden-app/dist
          destination_dir: preview/${{ steps.slug.outputs.value }}
          keep_files: true
          commit_message: "preview: ${{ github.ref_name }} @ ${{ github.sha }}"

      - name: Find associated PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`,
            });
            if (prs.data.length === 0) { core.setOutput('number', ''); return; }
            core.setOutput('number', String(prs.data[0].number));

      - name: Sticky PR comment with preview URL
        if: steps.pr.outputs.number != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr.outputs.number }}
          header: pva-preview
          message: |
            🔍 **Preview deploy ready**

            Branch: `${{ github.ref_name }}`
            URL: https://${{ env.PREVIEWS_PAGES_HOST }}/preview/${{ steps.slug.outputs.value }}/
            Commit: ${{ github.sha }}

            Production stays untouched.

            iOS/Android builds will not run until you reply `APPROVE NATIVE` in chat.
